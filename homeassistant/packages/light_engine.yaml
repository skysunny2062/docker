script:
  light_adjustable_mode:
    alias: 全屋-可調燈模式-中樞
    icon: mdi:routes
    description: 根據mode控制單燈Day/Night 預設Night 
    mode: parallel
    max: 50
    fields:
      entity_id:
        description: 燈的實體ID
      mode:
        description: 非Day即Night
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Day'' }}'
        sequence:
        - action: light.turn_on
          target:
            entity_id: '{{ entity_id }}'
          data:
            color_temp_kelvin: 4500
            brightness_pct: 100
      default:
      - action: light.turn_on
        target:
          entity_id: '{{ entity_id }}'
        data:
          effect: Night
          brightness_pct: 100
